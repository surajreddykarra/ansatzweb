<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="PostRun social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050201"/>
      <stop offset="56%" stop-color="#110603"/>
      <stop offset="100%" stop-color="#090402"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#ff9b54" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ff9b54" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#ffc27b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffc27b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcb9a"/>
      <stop offset="100%" stop-color="#ff7417"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,167,96,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <circle cx="156" cy="128" r="240" fill="url(#glowLeft)"/>
  <circle cx="1046" cy="388" r="270" fill="url(#glowRight)"/>

  <rect x="70" y="74" width="1060" height="482" rx="34" fill="rgba(18,8,4,0.46)" stroke="rgba(255,174,116,0.14)"/>

  <g transform="translate(110 112)">
    <rect x="0" y="0" width="170" height="48" rx="24" fill="rgba(255,155,84,0.10)" stroke="rgba(255,174,116,0.18)"/>
    <text x="26" y="31" fill="#ff9b54" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="3">POSTRUN</text>

    <text x="0" y="154" fill="#fff4ed" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="700">your run,</text>
    <text x="0" y="238" fill="#fff4ed" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="700">after the run.</text>

    <text x="0" y="316" fill="#f3d8c8" font-family="Arial, Helvetica, sans-serif" font-size="29">
      Connect Garmin and Strava with read-only access,
    </text>
    <text x="0" y="358" fill="#f3d8c8" font-family="Arial, Helvetica, sans-serif" font-size="29">
      customize your run stats, and create share-ready posts.
    </text>

  </g>
</svg>
